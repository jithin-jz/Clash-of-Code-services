apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: coc-chroma-pvc
  namespace: coc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: coc-redis-pvc
  namespace: coc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
