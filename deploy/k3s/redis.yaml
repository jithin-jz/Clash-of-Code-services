apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: coc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: redis-data
          mountPath: /data
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
      volumes:
      - name: redis-data
        persistentVolumeClaim:
          claimName: coc-redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: coc
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
